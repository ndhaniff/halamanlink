<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Halamanlink — UI design</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" />
  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: #f0eee9; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Shared primitives, icons, data, themes -->
  <script type="text/babel" data-presets="react" src="shared.jsx"></script>

  <!-- Screen components -->
  <script type="text/babel" data-presets="react" src="screens/profile.jsx"></script>
  <script type="text/babel" data-presets="react" src="screens/landing.jsx"></script>
  <script type="text/babel" data-presets="react" src="screens/auth.jsx"></script>
  <script type="text/babel" data-presets="react" src="screens/dashboard-shell.jsx"></script>
  <script type="text/babel" data-presets="react" src="screens/dashboard-links.jsx"></script>
  <script type="text/babel" data-presets="react" src="screens/dashboard-appearance.jsx"></script>
  <script type="text/babel" data-presets="react" src="screens/dashboard-analytics.jsx"></script>
  <script type="text/babel" data-presets="react" src="screens/dashboard-billing-settings.jsx"></script>
  <script type="text/babel" data-presets="react" src="screens/mobile-dash.jsx"></script>

  <!-- Canvas + Tweaks shells -->
  <script type="text/babel" data-presets="react" src="design-canvas.jsx"></script>
  <script type="text/babel" data-presets="react" src="tweaks-panel.jsx"></script>

  <!-- App composition (must load last) -->
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
