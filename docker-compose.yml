# Coolify: create a Docker Compose resource pointing at this file.
# Set env vars in the Coolify UI (no .env file required on the server).
#
# Local: cp .env.example .env then `docker compose up -d --build`
# Compose reads .env automatically for ${VAR} substitution.

services:
  halamanlink:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_DOMAIN: ${APP_DOMAIN:-localhost}
        APP_URL: ${APP_URL:-http://localhost:4321}
        ASTRO_DATABASE_FILE: /app/data/content.db
    image: halamanlink:latest
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_URL: ${APP_URL:-http://localhost:4321}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-long-random-string}
      ASTRO_DATABASE_FILE: /app/data/content.db
      UPLOAD_DIR: /app/data/uploads
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY:-}
    volumes:
      - halamanlink-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4321/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  halamanlink-data:
