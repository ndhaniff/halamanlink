# Coolify: create a Docker Compose resource pointing at this file.
# Set env vars in the Coolify UI (no .env file required on the server).
#
# Domains in Coolify UI: https://app.links.halaman.cc  (do NOT add *.links here)
# Also set TRAEFIK_DOMAIN_LABEL=links[.]halaman[.]cc for slug subdomain routing.
#
# Local: cp .env.example .env then `docker compose up -d --build`

services:
  halamanlink:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_DOMAIN: ${APP_DOMAIN:-localhost}
        APP_URL: ${APP_URL:-http://localhost:4321}
    image: halamanlink:latest
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_URL: ${APP_URL:-http://localhost:4321}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-long-random-string}
      ASTRO_DATABASE_FILE: /app/data/content.db
      UPLOAD_DIR: /app/data/uploads
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY:-}
    volumes:
      - halamanlink-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.halamanlink-slugs.rule=HostRegexp(`^[a-z0-9][a-z0-9-]*[.]${TRAEFIK_DOMAIN_LABEL:-links[.]halaman[.]cc}$`)
      - traefik.http.routers.halamanlink-slugs.entrypoints=https
      - traefik.http.routers.halamanlink-slugs.tls=true
      - traefik.http.routers.halamanlink-slugs.tls.certresolver=letsencrypt
      - traefik.http.routers.halamanlink-slugs.service=halamanlink-slugs
      - traefik.http.routers.halamanlink-slugs-http.rule=HostRegexp(`^[a-z0-9][a-z0-9-]*[.]${TRAEFIK_DOMAIN_LABEL:-links[.]halaman[.]cc}$`)
      - traefik.http.routers.halamanlink-slugs-http.entrypoints=http
      - traefik.http.routers.halamanlink-slugs-http.middlewares=redirect-to-https@file
      - traefik.http.routers.halamanlink-slugs-http.service=halamanlink-slugs
      - traefik.http.services.halamanlink-slugs.loadbalancer.server.port=4321
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4321/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  halamanlink-data:
