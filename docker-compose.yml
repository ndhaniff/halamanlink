# Coolify: New Resource → Docker Compose → this repo
#
# Coolify UI checklist (required for slug subdomains):
#   1. Domains: https://app.links.halaman.cc  ONLY (never https://*.links.halaman.cc)
#   2. Advanced → Connect To Predefined Network → coolify
#   3. Advanced → disable "Readonly Labels" if custom Traefik labels vanish after deploy
#   4. Env: APP_DOMAIN=links.halaman.cc, APP_URL=https://app.links.halaman.cc
#
# Local: cp .env.example .env && docker compose up -d --build

services:
  halamanlink:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_DOMAIN: ${APP_DOMAIN:-localhost}
        APP_URL: ${APP_URL:-http://localhost:4321}
    image: halamanlink:latest
    restart: unless-stopped
    expose:
      - "4321"
    ports:
      - "4321:4321"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_URL: ${APP_URL:-http://localhost:4321}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-long-random-string}
      ASTRO_DATABASE_FILE: /app/data/content.db
      UPLOAD_DIR: /app/data/uploads
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY:-}
    volumes:
      - halamanlink-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      # Slug pages: team7a.links.halaman.cc → this container (Traefik 3 HostRegexp)
      - traefik.http.routers.halamanlink-slugs-https.rule=HostRegexp(`^[a-z0-9][a-z0-9-]*[.]links[.]halaman[.]cc$`)
      - traefik.http.routers.halamanlink-slugs-https.entrypoints=https
      - traefik.http.routers.halamanlink-slugs-https.tls=true
      - traefik.http.routers.halamanlink-slugs-https.tls.certresolver=letsencrypt
      - traefik.http.routers.halamanlink-slugs-https.service=halamanlink-slugs
      - traefik.http.routers.halamanlink-slugs-https.priority=100
      - traefik.http.routers.halamanlink-slugs-http.rule=HostRegexp(`^[a-z0-9][a-z0-9-]*[.]links[.]halaman[.]cc$`)
      - traefik.http.routers.halamanlink-slugs-http.entrypoints=http
      - traefik.http.routers.halamanlink-slugs-http.middlewares=redirect-to-https@file
      - traefik.http.routers.halamanlink-slugs-http.service=halamanlink-slugs
      - traefik.http.routers.halamanlink-slugs-http.priority=100
      - traefik.http.services.halamanlink-slugs.loadbalancer.server.port=4321
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4321/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  halamanlink-data:
